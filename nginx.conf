server {
    listen 80;
    server_name _;          # replace with your domain or IP if needed

    # ── Frontend (built static files) ────────────────────────────────────────
    root /var/www/editian;  # path to `frontend/dist` after `npm run build`
    index index.html;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API ──────────────────────────────────────────────────────────
    # All /api/* requests are proxied to the FastAPI backend on port 8000.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (adjust as needed)
        client_max_body_size 200M;

        # Generous timeouts for long AI revision requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }
}
